apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-autoindex-conf
spec:
  # Usa 'data' invece di 'spec'
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;
        location / {
            root   /usr/share/nginx/html;
            autoindex on;               # Abilita la lista dei file (directory listing)
            autoindex_exact_size off;   # Mostra dimensioni in KB/MB/GB
            autoindex_localtime on;     # Usa l'orario locale
        }
    }
