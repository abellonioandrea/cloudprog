apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: cirros
  namespace: cldprog-5-block-vms-tests
spec:
  source:
    http:
      url: "https://download.cirros-cloud.net/0.6.3/cirros-0.6.3-x86_64-disk.img"
  pvc:
    accessModes:
      - ReadWriteOnce
    volumeMode: Block
    resources:
      requests:
        storage: 5Gi
